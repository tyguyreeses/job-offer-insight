app:
  name: "job-offer-insight"
  env: "dev"
  host: "127.0.0.1"
  port: 8000
  request_timeout_seconds: 30

logging:
  level: "INFO"
  json_logs: false
  include_timestamps: true

database:
  provider: "sqlite"
  path: "data/job_offer_insight.db"
  enable_wal: true
  timeout_seconds: 5

openai:
  api_key_env_var: "OPENAI_API_KEY"
  model: "gpt-5.3-mini"
  transcription_model: "gpt-4o-mini-transcribe"
  accepted_audio_extensions: [".wav", ".mp3", ".m4a", ".mp4", ".mpeg", ".mpga", ".webm"]
  timeout_seconds: 45
  max_retries: 2

workflow:
  enable_audio_intake: true
  enable_text_intake: true
  enable_missing_info_followups: true
  enable_non_monetary_summary: true
  allow_placeholder_comparisons: true

agents:
  entry_creation:
    type: non-structured
    enabled: true
    model: "gpt-5-mini"
    max_output_tokens: 500
    prompt: "entry_creation_chat.md"
    tools:
      - name: "submit_entry"
        description: "Call this when the user indicates they are done and wants to save now."
        enabled: true
  parse_entry:
    type: structured-output
    enabled: true
    model: "gpt-5-mini"
    max_output_tokens: 1200
    prompt: "extract_offer.md"

offer_schema:
  version: 1
  identity:
    company_name_path: "company_name"
    role_title_path: "role_title"
  required:
    all_of: ["company-name", "role-title", "location"]
    one_of:
      - ["annual-base-salary-usd"]
      - ["hourly-rate-usd", "hours-per-week"]
  card_sections:
    - section_id: "salary"
      title: "Salary"
    - section_id: "monetary"
      title: "Monetary benefits"
    - section_id: "non_monetary"
      title: "Non-monetary benefits"
    - section_id: "meta"
      title: "Date created"
  edit_sections:
    - section_id: "core"
      title: "Core details"
    - section_id: "compensation"
      title: "Compensation"
    - section_id: "monetary"
      title: "Monetary benefits"
    - section_id: "non_monetary"
      title: "Non-monetary benefits"
  fields:
    - id: "company-name"
      label: "Company name"
      storage_path: "company_name"
      data_type: "string"
      group: "core"
      required: true
      default_when_omitted: ""
      card:
        visible: false
        section_id: "salary"
        order: 0
        style: "labeled_value"
      edit:
        visible: true
        section_id: "core"
        order: 1
        widget: "text"
    - id: "role-title"
      label: "Role title"
      storage_path: "role_title"
      data_type: "string"
      group: "core"
      required: true
      default_when_omitted: ""
      card:
        visible: false
        section_id: "salary"
        order: 0
        style: "labeled_value"
      edit:
        visible: true
        section_id: "core"
        order: 2
        widget: "text"
    - id: "location"
      label: "Location"
      storage_path: "location"
      data_type: "string"
      group: "core"
      required: true
      default_when_omitted: ""
      card:
        visible: false
        section_id: "salary"
        order: 0
        style: "labeled_value"
      edit:
        visible: true
        section_id: "core"
        order: 3
        widget: "text"
    - id: "employment-type"
      label: "Employment type"
      storage_path: "employment_type"
      data_type: "string"
      group: "core"
      default_when_omitted: ""
